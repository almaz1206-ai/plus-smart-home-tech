server.port=8080

spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.routes[0].id=shopping_cart_service_route
spring.cloud.gateway.routes[0].uri=lb://shopping-cart
spring.cloud.gateway.routes[0].predicates[0]=Path=/shopping-cart/**
spring.cloud.gateway.routes[0].filters[0]=PrefixPath=/api/v1

spring.cloud.gateway.routes[1].id=shopping_store_service_route
spring.cloud.gateway.routes[1].uri=lb://shopping-store
spring.cloud.gateway.routes[1].predicates[0]=Path=/shopping-store/**
spring.cloud.gateway.routes[1].filters[0]=PrefixPath=/api/v1
spring.cloud.gateway.routes[1].filters[1].name=Retry
spring.cloud.gateway.routes[1].filters[1].args.retries=3
spring.cloud.gateway.routes[1].filters[1].args.methods=GET,POST
spring.cloud.gateway.routes[1].filters[1].args.backoff.firstBackoff=10ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.maxBackoff=50ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.factor=2
spring.cloud.gateway.routes[1].filters[1].args.backoff.basedOnPreviousValue=false

spring.cloud.gateway.routes[2].id=warehouse_service_route
spring.cloud.gateway.routes[2].uri=lb://warehouse
spring.cloud.gateway.routes[2].predicates[0]=Path=/warehouse/**
spring.cloud.gateway.routes[2].filters[0]=PrefixPath=/api/v1

spring.cloud.gateway.routes[3].id=order_service_route
spring.cloud.gateway.routes[3].uri=lb://order
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**
spring.cloud.gateway.routes[3].filters[0]=PrefixPath=/api/v1

spring.cloud.gateway.routes[4].id=delivery_service_route
spring.cloud.gateway.routes[4].uri=lb://delivery
spring.cloud.gateway.routes[4].predicates[0]=Path=/delivery/**
spring.cloud.gateway.routes[4].filters[0]=PrefixPath=/api/v1

spring.cloud.gateway.routes[5].id=payment_service_route
spring.cloud.gateway.routes[5].uri=lb://payment
spring.cloud.gateway.routes[5].predicates[0]=Path=/payment/**
spring.cloud.gateway.routes[5].filters[0]=PrefixPath=/api/v1
