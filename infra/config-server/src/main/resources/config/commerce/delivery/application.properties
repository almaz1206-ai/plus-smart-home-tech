server.port=0

spring.output.ansi.enabled=always

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:12541/delivery
spring.datasource.username=delivery
spring.datasource.password=delivery

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true

feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

delivery.cost.base-cost=5.0
delivery.cost.address-2-multiplier=2.0
delivery.cost.fragile-rate=0.2
delivery.cost.weight-rate=0.3
delivery.cost.volume-rate=0.2
delivery.cost.different-street-rate=0.2

logging.level.ru.practicum.delivery.feign.client=DEBUG