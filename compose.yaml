      POSTGRES_USER: store
      POSTGRES_PASSWORD: store
      POSTGRES_DB: store
    ports:
      - "8541:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U store -d store" ]
      timeout: 5s
      interval: 10s
